<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Language</title>

<style>
body{
    margin:0;
    padding:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ff7e5f,#feb47b);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    padding:40px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    text-align:center;
    width:320px;
}

h1{
    margin-bottom:25px;
    color:#333;
}

.lang-btn{
    display:block;
    width:220px;
    padding:15px;
    margin:10px auto;
    font-size:18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
    text-decoration:none;
    color:white;
}

.assamese{
    background:#ff6a00;
}

.assamese:hover{
    background:#e65c00;
    transform:scale(1.05);
}

.english{
    background:#0077ff;
}

.english:hover{
    background:#005ed6;
    transform:scale(1.05);
}

.datetime{
    margin-top:25px;
    font-size:16px;
    color:#444;
    padding-top:15px;
    border-top:1px solid #ddd;
}

#time{
    font-size:20px;
    font-weight:bold;
    margin-top:5px;
}
</style>

</head>

<body>

<div class="container">
    <h1>Select Language</h1>

    <a href="as.html" class="lang-btn assamese">
        অসমীয়া
    </a>

    <a href="eng.html" class="lang-btn english">
        English
    </a>

    <div class="datetime">
        <div id="date"></div>
        <div id="time"></div>
    </div>

</div>

<script>

function updateDateTime(){

    const now = new Date();

    const options = {
        weekday:'long',
        year:'numeric',
        month:'long',
        day:'numeric'
    };

    document.getElementById("date").innerHTML = now.toLocaleDateString('en-IN', options);
    document.getElementById("time").innerHTML = now.toLocaleTimeString('en-IN');

}

setInterval(updateDateTime,1000);
updateDateTime();

</script>

</body>
</html>
