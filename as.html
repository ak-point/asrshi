<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Resizer & Compressor</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f4f7;
text-align:center;
}

.header{
background:#1976d2;
color:white;
padding:15px;
font-size:22px;
font-weight:bold;
}

.container{
max-width:650px;
width:95%;
margin:auto;
background:white;
padding:20px;
margin-top:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.select-btn{
background:#4CAF50;
color:white;
padding:12px 20px;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

input[type=file]{
display:none;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:6px;
}

.row{
display:flex;
gap:10px;
margin-top:10px;
}

.row input{
flex:1;
}

button.action{
width:100%;
background:#1976d2;
color:white;
padding:14px;
border:none;
border-radius:6px;
font-size:16px;
margin-top:15px;
cursor:pointer;
}

.preview img{
max-width:100%;
margin-top:10px;
border-radius:8px;
}

.download{
margin-top:15px;
display:none;
}

.download a{
background:#ff5722;
color:white;
padding:12px 20px;
text-decoration:none;
border-radius:6px;
display:inline-block;
}

</style>
</head>

<body>

<div class="header">Image Resizer & Compressor</div>

<div class="container">

<button class="select-btn" onclick="document.getElementById('imageInput').click()">
Select Image
</button>

<input type="file" id="imageInput" accept="image/*">

<div class="preview" id="preview"></div>

<input type="number" id="dpi" placeholder="DPI (Example 300)">

<div class="row">
<input type="number" id="widthCM" placeholder="Width (CM)">
<input type="number" id="heightCM" placeholder="Height (CM)">
</div>

<input type="number" id="targetKB" placeholder="Compress Image to Size (KB)">

<button class="action" onclick="processImage()">Resize & Compress</button>

<canvas id="canvas" style="display:none"></canvas>

<div class="download" id="downloadBox">
<a id="downloadBtn">Download Image</a>
<p id="filesize"></p>
</div>

</div>

<script>

let selectedFile;

document.getElementById("imageInput").addEventListener("change",function(e){

selectedFile=e.target.files[0];

let preview=document.getElementById("preview");
preview.innerHTML="";

let img=document.createElement("img");
img.src=URL.createObjectURL(selectedFile);

preview.appendChild(img);

});


function processImage(){

if(!selectedFile){
alert("Please select an image");
return;
}

let dpi=document.getElementById("dpi").value||300;
let widthCM=document.getElementById("widthCM").value||5;
let heightCM=document.getElementById("heightCM").value||5;
let targetKB=document.getElementById("targetKB").value;

let widthPX=(widthCM/2.54)*dpi;
let heightPX=(heightCM/2.54)*dpi;

let img=new Image();
let reader=new FileReader();

reader.onload=function(e){
img.src=e.target.result;
}

reader.readAsDataURL(selectedFile);

img.onload=function(){

let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");

canvas.width=widthPX;
canvas.height=heightPX;

ctx.drawImage(img,0,0,widthPX,heightPX);

let quality=0.9;
let url=canvas.toDataURL("image/jpeg",quality);

if(targetKB){

let sizeKB;

do{

url=canvas.toDataURL("image/jpeg",quality);
sizeKB=(url.length*3/4)/1024;

quality-=0.05;

}while(sizeKB>targetKB && quality>0.05)

}

let downloadBtn=document.getElementById("downloadBtn");
downloadBtn.href=url;
downloadBtn.download="compressed-image.jpg";

document.getElementById("downloadBox").style.display="block";

let finalSize=(url.length*3/4)/1024;

document.getElementById("filesize").innerText=
"Final Size: "+finalSize.toFixed(2)+" KB";

}

}

</script>

</body>
</html>
